<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>THP AI</title>
<style>
:root { --primary: #4F46E5; --bg: #F8FAFC; --surface: #FFFFFF; --border: #E2E8F0; --text: #1E293B; }
body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
.tabs { display: flex; background: #FFF; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.tab-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 700; color: #94A3B8; }
.tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
.content { display: none; padding: 20px; }
.content.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
#char-icon { width: 50px; height: 50px; background: var(--primary); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; margin: 0 auto; user-select: none; }
/* モーダル */
#modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 20; justify-content: center; align-items: center; }
.modal-content { background: white; padding: 20px; border-radius: 20px; width: 80%; max-width: 400px; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab-btn active" onclick="showTab('reg', this)">登録</div>
  <div class="tab-btn" onclick="showTab('ana', this)">解析</div>
  <div class="tab-btn" onclick="showTab('act', this)">指針</div>
</div>

<div id="tab-reg" class="content active">
  <div class="card">
    <h3>ユーザー設定</h3>
    <input type="date" id="bday" class="card" style="width:100%">
    <button class="btn-primary" onclick="alert('同期しました')">同期保存</button>
  </div>
</div>

<div id="tab-ana" class="content">
  <div class="card">
    <h3>易経解析</h3>
    <button onclick="castIChing()">易を立てる</button>
    <div id="ichingResult"></div>
  </div>
</div>

<div id="tab-act" class="content">
  <div class="card">
    <h3>対話</h3>
    <div id="char-icon">🤖</div>
    <div id="chat-box" style="height:200px; overflow-y:auto; border:1px solid #ccc;"></div>
    <input type="text" id="chatInput" placeholder="相談を入力...">
    <button onclick="dispatchChat()">送信</button>
  </div>
</div>

<div id="modal">
  <div class="modal-content">
    <h3>キャラ設定</h3>
    <input type="text" id="charName" placeholder="名前">
    <textarea id="charPrompt" placeholder="あなたは〜のキャラです..."></textarea>
    <button onclick="saveChar()">保存</button>
  </div>
</div>

<script>
// タブ切り替え
function showTab(id, el) {
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  el.classList.add('active');
}

// 長押しロジック
const icon = document.getElementById('char-icon');
let timer;
icon.addEventListener('touchstart', () => timer = setTimeout(() => document.getElementById('modal').style.display='flex', 500));
icon.addEventListener('touchend', () => clearTimeout(timer));

function saveChar() {
  localStorage.setItem('char_name', document.getElementById('charName').value);
  localStorage.setItem('char_prompt', document.getElementById('charPrompt').value);
  document.getElementById('modal').style.display = 'none';
}

function castIChing() {
  const hexagrams = ["乾為天", "坤為地", "水雷屯", "山水蒙"];
  document.getElementById('ichingResult').innerText = hexagrams[Math.floor(Math.random() * hexagrams.length)];
}

async function dispatchChat() {
  const char = localStorage.getItem('char_name') || 'ディレクター';
  const prompt = localStorage.getItem('char_prompt') || 'あなたは賢明なAIです。';
  const msg = document.getElementById('chatInput').value;
  // ここでキャラ設定を連結したプロンプトを送信
  console.log(`[${char}]として振る舞う: ${prompt}。内容: ${msg}`);
}
</script>
</body>
</html>
