<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Total Human Produce AI</title>
<style>
:root {
  --bg: #0B0F19; --surface: #151D30; --border: #24324F;
  --primary: #6366F1; --accent: #EC4899; --purple: #A855F7;
  --text: #F8FAFC; --sub: #94A3B8; --font: 'Hiragino Sans','Noto Sans JP',sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* 画面切り替え制御 */
.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }
.scroll-content { flex: 1; overflow-y: auto; padding: 20px; }

/* 問診画面（インタビュー） */
.setup-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; max-width: 440px; margin: 20px auto; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
h2 { font-size: 18px; margin-bottom: 16px; text-align: center; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
.q-group { margin-bottom: 16px; }
label { display: block; font-size: 11px; font-weight: 700; color: var(--sub); margin-bottom: 6px; text-transform: uppercase; }
.input-field, select { width: 100%; padding: 12px; background: #0B0F19; border: 1px solid var(--border); border-radius: 10px; color: white; font-size: 14px; outline: none; font-family: inherit; }
.input-field:focus, select:focus { border-color: var(--primary); }
.gender-row { display: flex; gap: 10px; }
.gender-btn { flex: 1; padding: 12px; background: #0B0F19; border: 1px solid var(--border); border-radius: 10px; color: var(--sub); cursor: pointer; text-align: center; font-weight: 700; }
.gender-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.gender-btn.active.female { background: var(--accent); border-color: var(--accent); }
#femaleOpt { display: none; background: rgba(236,72,153,0.05); padding: 14px; border-radius: 10px; border: 1px dashed rgba(236,72,153,0.2); margin-top: 10px; }

/* メインダッシュボード */
.hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.hdr-logo { font-size: 15px; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hdr-badge { background: rgba(99,102,241,0.1); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; font-size: 11px; color: var(--sub); }

.dashboard-layout { flex: 1; display: flex; overflow: hidden; }
.status-side { width: 300px; border-right: 1px solid var(--border); background: #0F1524; display: flex; flex-direction: column; gap: 12px; padding: 16px; overflow-y: auto; }
.chat-main { flex: 1; display: flex; flex-direction: column; background: #090D17; }

/* ステータスカード */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
.card-lbl { font-size: 10px; font-weight: 700; color: var(--sub); margin-bottom: 4px; letter-spacing: 0.5px; }
.card-val { font-size: 15px; font-weight: 800; color: #FFF; margin-bottom: 2px; }
.card-desc { font-size: 11px; color: var(--sub); line-height: 1.4; }

/* チャットシステム */
.chat-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 85%; padding: 12px 14px; border-radius: 16px; font-size: 13.5px; line-height: 1.5; white-space: pre-wrap; }
.bubble.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 4px 10px rgba(99,102,241,0.2); }
.bubble.ai { background: var(--surface); border: 1px solid var(--border); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; }
.chat-input-row { background: var(--surface); border-top: 1px solid var(--border); padding: 12px; display: flex; gap: 8px; align-items: center; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
.chat-txa { flex: 1; background: #0B0F19; border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; color: white; font-family: inherit; font-size: 14px; outline: none; height: 40px; resize: none; }
.send-btn { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--purple)); border: none; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.action-btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; color: var(--sub); font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; margin-top: auto; }

@media (max-width: 768px) {
  .dashboard-layout { flex-direction: column; }
  .status-side { width: 100%; height: 180px; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<div id="screen-interview" class="screen">
  <div class="scroll-content">
    <div class="setup-box">
      <h2>生体・魂・認知シンクロ問診</h2>
      
      <div class="q-group">
        <label>生物学的タイプ（バイオリズム同期用）</label>
        <div class="gender-row">
          <div class="gender-btn active" id="g-male" onclick="setGenderType('male')">男性 / その他</div>
          <div class="gender-btn" id="g-female" onclick="setGenderType('female')">女性（月経周期同調）</div>
        </div>
        <div id="femaleOpt">
          <div class="q-group" style="margin-top:10px;">
            <label>直近の月経開始日</label>
            <input type="date" id="periodStart" class="input-field">
          </div>
          <div class="q-group" style="margin-bottom:0;">
            <label>平均周期（日）</label>
            <input type="number" id="periodCycle" class="input-field" value="28" min="20" max="45">
          </div>
        </div>
      </div>

      <div class="q-group">
        <label>生年月日（四柱推命・エネルギー解析）</label>
        <input type="date" id="birthDate" class="input-field" value="2000-01-01">
      </div>

      <div class="q-group">
        <label>血液型</label>
        <select id="bloodType">
          <option value="A">A型</option><option value="B">B型</option>
          <option value="O">O型</option><option value="AB">AB型</option>
        </select>
      </div>

      <div class="q-group">
        <label>MBTI性格診断タイプ</label>
        <select id="mbtiType">
          <option value="INFJ">INFJ (提唱者)</option><option value="INTJ">INTJ (建築家)</option>
          <option value="ENFP">ENFP (運動家)</option><option value="INFP">INFP (仲介者)</option>
          <option value="ENTP">ENTP (討論者)</option><option value="ESTJ">ESTJ (幹部)</option>
          <option value="ISFJ">ISFJ (擁護者)</option><option value="ESFP">ESFP (エンターテイナー)</option>
        </select>
      </div>

      <button class="send-btn" style="width:100%; border-radius:12px; font-weight:bold; font-size:15px; margin-top:10px;" onclick="executeSync()">🧬 全データを完全同期する</button>
    </div>
  </div>
</div>

<div id="screen-dashboard" class="screen">
  <div class="hdr">
    <div class="hdr-logo">TOTAL HUMAN PRODUCE</div>
    <div class="hdr-badge" id="syncBadge">SYNCED</div>
  </div>
  
  <div class="dashboard-layout">
    <div class="status-side">
      <div class="card" style="border-left: 4px solid var(--primary);">
        <div class="card-lbl">🔮 宿命エネルギー属性 (四柱推命)</div>
        <div class="card-val" id="viewElement">--</div>
        <div class="card-desc">生年月日より導かれたあなたの本質・魂の設計図。</div>
      </div>
      
      <div class="card" style="border-left: 4px solid var(--purple);">
        <div class="card-lbl">🧩 認知気質モデル (MBTI × 血液型)</div>
        <div class="card-val" id="viewMbti">--</div>
        <div class="card-desc">社会的対人関係における脳の認知負荷・防衛バイアス。</div>
      </div>

      <div class="card" id="hormoneCard" style="border-left: 4px solid var(--accent); display:none;">
        <div class="card-lbl">🚺 内分泌バイオリズム (ホルモン同調)</div>
        <div class="card-val" id="viewHormone">分析中...</div>
        <div class="card-desc" id="viewHormoneDesc">ホルモン分泌推計に基づく本日の思考・メンタル波形。</div>
      </div>
      
      <button class="action-btn" onclick="resetApp()">🔄 バイオ同期をリセット</button>
    </div>
    
    <div class="chat-main">
      <div class="chat-msgs" id="chatWrapper"></div>
      <div class="chat-input-row">
        <textarea class="chat-txa" id="chatInput" placeholder="ディレクターAIに本日の行動指針を問う..." rows="1"></textarea>
        <button class="send-btn" onclick="dispatchChat()">➔</button>
      </div>
    </div>
  </div>
</div>

<script>
const EP = 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
const KEY = 'HeartsHouse2026Key';
let profile = null;

window.addEventListener('DOMContentLoaded', () => {
  const cache = localStorage.getItem('thp_v1_profile');
  if (cache) {
    profile = JSON.parse(cache);
    showDashboard();
  } else {
    document.getElementById('screen-interview').classList.add('active');
    document.getElementById('periodStart').valueAsDate = new Date();
  }
});

function setGenderType(type) {
  document.getElementById('g-male').classList.toggle('active', type === 'male');
  document.getElementById('g-female').classList.toggle('active', type === 'female');
  document.getElementById('g-female').classList.toggle('female', type === 'female');
  document.getElementById('femaleOpt').style.display = type === 'female' ? 'block' : 'none';
}

function calcElement(dateStr) {
  const list = ["甲木 (大樹)", "乙木 (草花)", "丙火 (太陽)", "丁火 (灯火)", "戊土 (山岳)", "己土 (田園)", "庚金 (刀剣)", "辛金 (宝石)", "壬水 (大海)", "癸水 (雨露)"];
  const d = new Date(dateStr);
  return list[(d.getFullYear() + d.getMonth() + d.getDate()) % 10];
}

function executeSync() {
  const isFemale = document.getElementById('g-female').classList.contains('active');
  const bDate = document.getElementById('birthDate').value;
  
  profile = {
    gender: isFemale ? 'female' : 'male',
    birthDate: bDate,
    element: calcElement(bDate),
    blood: document.getElementById('bloodType').value,
    mbti: document.getElementById('mbtiType').value,
    periodStart: isFemale ? document.getElementById('periodStart').value : null,
    periodCycle: isFemale ? (parseInt(document.getElementById('periodCycle').value) || 28) : null
  };
  
  localStorage.setItem('thp_v1_profile', JSON.stringify(profile));
  showDashboard();
}

function showDashboard() {
  document.getElementById('screen-interview').classList.remove('active');
  document.getElementById('screen-dashboard').classList.add('active');
  
  document.getElementById('syncBadge').textContent = `SYNC: ${profile.mbti}`;
  document.getElementById('viewElement').textContent = profile.element;
  document.getElementById('viewMbti').textContent = `${profile.mbti} (${profile.blood}型)`;
  
  if (profile.gender === 'female' && profile.periodStart) {
    const card = document.getElementById('hormoneCard');
    card.style.display = 'block';
    
    const diff = Math.floor(Math.abs(new Date() - new Date(profile.periodStart)) / (1000*60*60*24)) % profile.periodCycle;
    let phase = "", desc = "";
    
    if (diff <= 7) { phase = `Day ${diff} : 月経期`; desc = "エストロゲン・プロゲステロン共に極小。脳波のデフォルトモードネットワークが活発化。内省やアイデア整理に最適。"; }
    else if (diff <= 14) { phase = `Day ${diff} : 卵胞期`; desc = "エストロゲン分泌が急上昇しピークへ。脳のワーキングメモリが最大化し、決断力・モチベーションが最高潮のゾーン状態。"; }
    else if (diff <= 22) { phase = `Day ${diff} : 黄体期前半`; desc = "プロゲステロン優位。共感力や協調性が高まる一方、身体は休息モードを求め始めます。他者との調和に良い時期。"; }
    else { phase = `Day ${diff} : 黄体期後半 (PMS期)`; desc = "セロトニンが急激に低下。認知バイアス（ネガティブ思考）が暴走しやすいメカニズム。重要な人生の決断は絶対先送りを推奨。"; }
    
    document.getElementById('viewHormone').textContent = phase;
    document.getElementById('viewHormoneDesc').textContent = desc;
  }
  
  const wrapper = document.getElementById('chatWrapper');
  if (wrapper.children.length === 0) {
    pushBubble('ai', `トータルヒューマンプロデュースディレクターAIです。🎓\n\nあなたの宿命属性【${profile.element}】、社会的認知特性【${profile.mbti}】、そして現在の体内バイオリズムを完全に同調・統合解析しました。\n\n本日の仕事、恋愛、または対人関係における具体的な道標（アクションプラン）について、どのようなナビゲーションが必要ですか？`);
  }
}

function pushBubble(role, text) {
  const w = document.getElementById('chatWrapper');
  const b = document.createElement('div');
  b.className = `bubble ${role}`;
  b.textContent = text;
  w.appendChild(b);
  w.scrollTop = w.scrollHeight;
}

async function dispatchChat() {
  const tx = document.getElementById('chatInput');
  const msg = tx.value.trim();
  if (!msg) return;
  
  pushBubble('user', msg);
  tx.value = '';
  
  pushBubble('ai', '各専門科学AI（脳科学・進化心理学・内分泌ホルモン学・恋愛マスター）とマインドシンクロ分析中...');
  const w = document.getElementById('chatWrapper');
  const lastAi = w.lastChild;
  
  try {
    const sys = `あなたは世界一のトータルヒューマンプロデュースディレクターAIです。
配下にある【進化心理学】【脳科学】【内分泌ホルモン学】【認知学】【世界一の恋愛マスター】【四柱推命】の専門知見を完全に統合し、ユーザーに最適化された具体的な道標を回答してください。

【ユーザーの同期コンテキスト】
・魂の本質（四柱推命）: ${profile.element}
・社会的認知（MBTI・血液型）: ${profile.mbti} (${profile.blood}型)
・生体情報: ${profile.gender === 'female' ? '女性（月経・ホルモン周期計算有効）' : '一般モード'}

このデータを基盤とし、精神論ではなく「脳内物質の動態」や「人間の本能的欲求」の観点から、相手の心に100%シンクロする超具体的な解決策やセリフ、行動指針を優しくリードして提示してください。`;

    const r = await fetch(EP, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-access-key': KEY },
      body: JSON.stringify({
        model: 'gemini-2.5-flash', mode: 'normal',
        prompt: `${sys}\n\nユーザーの相談:\n${msg}`,
        useSearch: false, useCache: false
      })
    });
    
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json().catch(() => ({}));
    lastAi.textContent = d?.data?.text || d?.candidates?.[0]?.content?.parts?.[0]?.text || d?.text || '同期シグナルが途絶えました。再度お試しください。';
  } catch (e) {
    lastAi.textContent = `❌ シンクロ解析エラー: ${e.message}`;
  }
}

function resetApp() {
  if (confirm('同期データをリセットし、初期問診に戻りますか？')) {
    localStorage.removeItem('thp_v1_profile');
    document.getElementById('chatWrapper').innerHTML = '';
    document.getElementById('hormoneCard').style.display = 'none';
    document.getElementById('screen-dashboard').classList.remove('active');
    document.getElementById('screen-interview').classList.add('active');
  }
}
</script>
</body>
</html>
